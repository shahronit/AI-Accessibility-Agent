# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy from the Render dashboard → "New" → "Blueprint" → point to this repo,
# or create a Web Service manually with Docker runtime.
# Add secret env vars (GEMINI_API_KEY, JWT_SECRET, etc.) in the Render dashboard.

services:
  - type: web
    name: a11yagent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /app/data/a11yagent.db
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
